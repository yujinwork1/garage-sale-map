<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lloydminster Garage Sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --panel:#fff;
  --bg:#f1f3f4;
  --text:#1a1a1a;
  --text-2:#5f6368;
  --text-3:#9aa0a6;
  --border:#e0e0e0;
  --accent:#1a73e8;
  --accent-bg:#e8f0fe;
  --pin:#ea4335;
  --pin-active:#b31412;
  --green:#137333;
  --green-bg:#e6f4ea;
  --shadow-sm:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.07);
  --shadow-md:0 2px 10px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.07);
  --shadow-lg:0 4px 24px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.08);
  --r:12px;--r-sm:8px;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
html,body{height:100%;width:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}

/* MAP */
#map{position:absolute;inset:0;z-index:0}
.leaflet-control-zoom{border:none!important;box-shadow:var(--shadow-md)!important;border-radius:var(--r-sm)!important;overflow:hidden}
.leaflet-control-zoom a{background:#fff!important;color:var(--text)!important;border:none!important;font-size:16px!important;width:36px!important;height:36px!important;line-height:36px!important;border-bottom:1px solid var(--border)!important}
.leaflet-control-zoom-out{border-bottom:none!important}
.leaflet-control-zoom a:hover{background:#f8f9fa!important}
.leaflet-popup-content-wrapper{border-radius:var(--r)!important;box-shadow:var(--shadow-lg)!important;border:1px solid var(--border);padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;width:auto!important;min-width:200px}
.leaflet-popup-tip{box-shadow:none!important}
.leaflet-popup-close-button{top:8px!important;right:8px!important;color:var(--text-2)!important;font-size:18px!important;z-index:10;width:24px!important;height:24px!important;line-height:24px!important;text-align:center}

/* TOP BAR */
#topbar{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;align-items:center;gap:10px;
  width:min(560px,calc(100vw - 32px));
}
#searchbar{
  flex:1;background:#fff;border-radius:28px;
  box-shadow:var(--shadow-md);display:flex;align-items:center;
  gap:8px;padding:0 16px;height:52px;
  border:1.5px solid transparent;transition:box-shadow .2s;
}
#searchbar:focus-within{box-shadow:var(--shadow-lg)}
#searchbar svg{color:var(--text-3);flex-shrink:0}
#searchbar input{flex:1;border:none;outline:none;font-family:var(--font);font-size:15px;color:var(--text);background:transparent}
#searchbar input::placeholder{color:var(--text-3)}
#count-pill{
  background:#fff;border-radius:28px;box-shadow:var(--shadow-md);
  height:52px;padding:0 18px;display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;color:var(--text-2);white-space:nowrap;flex-shrink:0;
}
#count-pill strong{color:var(--pin);font-family:var(--mono);font-size:15px}

/* SIDE PANEL */
#side-panel{
  position:absolute;top:84px;left:16px;bottom:16px;
  z-index:997;width:320px;
  background:#fff;border-radius:var(--r);
  box-shadow:var(--shadow-md);border:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#panel-header{
  padding:14px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
#panel-header h2{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
#panel-header .ph-sub{font-size:12px;color:var(--text-2)}

#listing-list{flex:1;overflow-y:auto;padding:6px}
#listing-list::-webkit-scrollbar{width:4px}
#listing-list::-webkit-scrollbar-thumb{background:#dadce0;border-radius:2px}

.listing-item{
  border-radius:var(--r-sm);padding:11px 12px;
  cursor:pointer;display:flex;align-items:flex-start;gap:10px;
  transition:background .12s;border:1.5px solid transparent;margin-bottom:3px;
}
.listing-item:hover{background:#f8f9fa}
.listing-item.active{background:#fef2f2;border-color:#f28b82}
.li-num{
  width:24px;height:24px;border-radius:50%;
  background:var(--pin);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:600;
  flex-shrink:0;font-family:var(--mono);margin-top:1px;transition:background .12s;
}
.listing-item.active .li-num{background:var(--pin-active)}
.li-info{flex:1;min-width:0}
.li-addr{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.35}
.li-hours{font-size:12px;color:var(--text-2);display:flex;align-items:flex-start;gap:5px;line-height:1.4}
.li-hours svg{flex-shrink:0;margin-top:1px}
.li-notes{font-size:11px;color:var(--green);background:var(--green-bg);border-radius:4px;padding:2px 7px;margin-top:5px;display:inline-block;font-weight:500}
.li-notfound{font-size:11px;color:var(--text-3);margin-top:3px}

/* SKELETON */
.skeleton{border-radius:var(--r-sm);padding:11px 12px;margin-bottom:3px;display:flex;align-items:flex-start;gap:10px}
.sk-circle{width:24px;height:24px;border-radius:50%;background:#f0f0f0;flex-shrink:0;animation:shimmer 1.4s infinite}
.sk-lines{flex:1}
.sk-line{height:11px;border-radius:4px;background:#f0f0f0;margin-bottom:6px;animation:shimmer 1.4s infinite}
.sk-line.w80{width:80%}.sk-line.w60{width:60%}.sk-line.w40{width:40%}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}

/* POPUP */
.popup-body{padding:14px 16px;font-family:var(--font)}
.popup-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--pin);color:#fff;border-radius:50%;font-size:9px;font-weight:700;font-family:var(--mono);margin-bottom:7px}
.popup-addr{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.35}
.popup-row{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--text-2);margin-bottom:4px;line-height:1.5}
.popup-row svg{flex-shrink:0;margin-top:2px}
.popup-notes{font-size:11px;color:var(--green);background:var(--green-bg);border-radius:5px;padding:3px 8px;margin-top:6px;display:inline-block;font-weight:500}

/* OVERLAY */
#overlay{
  position:absolute;inset:0;z-index:2000;
  background:rgba(255,255,255,.92);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.ov-spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:var(--pin);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-label{font-size:14px;font-weight:500;color:var(--text-2)}
.ov-sub{font-size:12px;color:var(--text-3)}
.ov-error-box{background:#fce8e6;border-radius:var(--r-sm);padding:12px 18px;font-size:13px;color:#c5221f;max-width:320px;text-align:center;line-height:1.5}
.ov-retry{background:var(--pin);color:#fff;border:none;border-radius:var(--r-sm);padding:9px 22px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.ov-retry:hover{background:var(--pin-active)}

/* MOBILE */
@media(max-width:640px){
  #side-panel{left:0;right:0;bottom:0;top:auto;width:100%;height:52vh;border-radius:var(--r) var(--r) 0 0}
  #topbar{top:12px}
  #count-pill{display:none}
}
</style>
</head>
<body>

<div id="map"></div>

<div id="overlay">
  <div class="ov-spinner"></div>
  <div class="ov-label">Loading garage sales…</div>
  <div class="ov-sub">Fetching listings</div>
</div>

<div id="topbar">
  <div id="searchbar">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search address or hours…" autocomplete="off"/>
  </div>
  <div id="count-pill"><strong id="count-num">—</strong> sales</div>
</div>

<div id="side-panel">
  <div id="panel-header">
    <h2>🏷️ Garage Sales</h2>
    <div class="ph-sub" id="ph-sub">Lloydminster</div>
  </div>
  <div id="listing-list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIuBgzjNnvF7cW-YhNqiemWRcJaCOCId4qFOErcP3aXAYI7hQ_DYPuwR2N38U15V8Z/exec';
// ════════════════════════════════════════

const LLOYD = [53.2833, -110.0000];
let map, markers = [], allRows = [], activeIdx = null;

window.addEventListener('DOMContentLoaded', function() {
map = L.map('map', { zoomControl:true, attributionControl:true }).setView(LLOYD, 13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);
map.zoomControl.setPosition('bottomright');

const GEO = {};
async function geocode(addr) {
  const q = /lloydminster/i.test(addr) ? addr : addr + ', Lloydminster, AB, Canada';
  if (GEO[q]) return GEO[q];
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&countrycodes=ca`,
      { headers:{ 'User-Agent':'MeridianSource-GarageSales/1.0' }});
    const d = await r.json();
    if (d[0]) { const c={lat:+d[0].lat,lng:+d[0].lon}; GEO[q]=c; return c; }
  } catch(e) {}
  return null;
}

function makePin(n, active=false) {
  const s = active ? 38 : 30;
  return L.divIcon({
    html:`<div style="width:${s}px;height:${s}px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${active?'#b31412':'#ea4335'};border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);color:#fff;font-size:${active?11:9}px;font-weight:700;font-family:'DM Mono',monospace">${n}</span></div>`,
    iconSize:[s,s], iconAnchor:[s/2,s], popupAnchor:[0,-(s+4)], className:''
  });
}

function popupHTML(row, n) {
  return `<div class="popup-body">
    <div class="popup-num">${n}</div>
    <div class="popup-addr">${row.address}</div>
    <div class="popup-row">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ${row.hours}
    </div>
    ${row.notes?`<div class="popup-notes">📝 ${row.notes}</div>`:''}
  </div>`;
}

async function render(rows) {
  allRows = rows;
  markers.forEach(m => m && m.marker.remove()); markers = [];
  const list = document.getElementById('listing-list');
  list.innerHTML = '';
  document.getElementById('count-num').textContent = rows.length;
  document.getElementById('ph-sub').textContent = `${rows.length} location${rows.length!==1?'s':''} · Lloydminster`;

  rows.forEach(() => {
    const sk = document.createElement('div');
    sk.className = 'skeleton';
    sk.innerHTML = `<div class="sk-circle"></div><div class="sk-lines"><div class="sk-line w80"></div><div class="sk-line w60"></div><div class="sk-line w40"></div></div>`;
    list.appendChild(sk);
  });

  for (let i = 0; i < rows.length; i++) {
    const c = await geocode(rows[i].address);

    const item = document.createElement('div');
    item.className = 'listing-item';
    item.id = `li-${i}`;
    item.innerHTML = `
      <div class="li-num">${i+1}</div>
      <div class="li-info">
        <div class="li-addr">${rows[i].address}</div>
        <div class="li-hours">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${rows[i].hours}
        </div>
        ${rows[i].notes?`<span class="li-notes">📝 ${rows[i].notes}</span>`:''}
        ${!c?'<div class="li-notfound">⚠ Address not found on map</div>':''}
      </div>`;
    item.addEventListener('click', () => focus(i));
    list.replaceChild(item, list.children[i]);

    if (c) {
      const m = L.marker([c.lat,c.lng], { icon:makePin(i+1) })
        .addTo(map)
        .bindPopup(popupHTML(rows[i],i+1), { maxWidth:300 });
      m.on('click', () => focus(i, false));
      markers.push({ marker:m, coords:c });
    } else {
      markers.push(null);
    }
  }

  const valid = markers.filter(Boolean);
  if (valid.length) map.fitBounds(L.featureGroup(valid.map(m=>m.marker)).getBounds().pad(0.2));
}

function focus(i, fly=true) {
  if (activeIdx !== null) {
    const prev = document.getElementById(`li-${activeIdx}`);
    if (prev) prev.classList.remove('active');
    if (markers[activeIdx]) markers[activeIdx].marker.setIcon(makePin(activeIdx+1,false));
  }
  activeIdx = i;
  const item = document.getElementById(`li-${i}`);
  if (item) { item.classList.add('active'); item.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  if (markers[i]) {
    markers[i].marker.setIcon(makePin(i+1,true));
    markers[i].marker.openPopup();
    if (fly) map.flyTo([markers[i].coords.lat,markers[i].coords.lng],16,{duration:0.6});
  }
}

document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  allRows.forEach((row,i) => {
    const match = !q || [row.address,row.hours,row.notes||''].join(' ').toLowerCase().includes(q);
    const el = document.getElementById(`li-${i}`);
    if (el) el.style.display = match ? '' : 'none';
    if (markers[i]) markers[i].marker.setOpacity(match ? 1 : 0.15);
  });
});

async function fetchSales() {
  showOverlay('loading');
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getGarageSales`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!data.sales || !data.sales.length) throw new Error('No listings found in the GarageSales sheet.');
    hideOverlay();
    await render(data.sales);
  } catch(err) {
    showOverlay('error', err.message);
  }
}
window.fetchSales = fetchSales;

function showOverlay(type, msg='') {
  const ov = document.getElementById('overlay');
  if (type === 'loading') {
    ov.innerHTML = `<div class="ov-spinner"></div><div class="ov-label">Loading garage sales…</div><div class="ov-sub">Fetching listings</div>`;
  } else {
    ov.innerHTML = `<div class="ov-error-box">⚠️ ${msg}</div><button class="ov-retry" onclick="fetchSales()">Try again</button>`;
  }
  ov.style.display = 'flex';
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

fetchSales();
}); // end DOMContentLoaded
</script>
</body>
</html>
